services:
  db:
    image: postgres:16-alpine
    container_name: week3-postgres-workshop
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-workshop}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-workshop_local_dev}
      POSTGRES_DB: ${POSTGRES_DB:-communitybridge_workshop}
    volumes:
      - week3_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  week3_postgres_data:
