name: Autograding Tests

on:
  push:
  workflow_dispatch:
  repository_dispatch:

permissions:
  checks: write
  actions: read
  contents: read

env:
  POSTGRES_HOST: localhost
  POSTGRES_PORT: "5432"
  POSTGRES_USER: workshop
  POSTGRES_PASSWORD: workshop_ci
  POSTGRES_DB: communitybridge_workshop

jobs:
  run-autograding-tests:
    runs-on: ubuntu-latest
    if: github.actor != 'github-classroom[bot]'

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: workshop
          POSTGRES_PASSWORD: workshop_ci
          POSTGRES_DB: communitybridge_workshop
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U workshop -d communitybridge_workshop"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # autograding-command-grader often runs pytest without inheriting workflow env.
      # Tests load REPO_ROOT/.env via python-dotenv (same values as workflow env / postgres service).
      - name: Create .env for pytest
        run: |
          {
            echo "POSTGRES_HOST=${{ env.POSTGRES_HOST }}"
            echo "POSTGRES_PORT=${{ env.POSTGRES_PORT }}"
            echo "POSTGRES_USER=${{ env.POSTGRES_USER }}"
            echo "POSTGRES_PASSWORD=${{ env.POSTGRES_PASSWORD }}"
            echo "POSTGRES_DB=${{ env.POSTGRES_DB }}"
          } > .env

      - name: Pytest (Command Grader)
        id: pytest
        uses: education/autograding-command-grader@v1
        with:
          test-name: pytest
          setup-command: |
            python -m pip install --upgrade pip
            pip install -r requirements.txt
          command: pytest -q --disable-warnings --maxfail=1
          timeout: 10
          max-score: 100

      - name: Autograding Reporter
        uses: classroom-resources/autograding-grading-reporter@v1
        env:
          PYTEST_RESULTS: "${{ steps.pytest.outputs.result }}"
        with:
          runners: pytest
